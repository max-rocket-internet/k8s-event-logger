name: Run Tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: make test

  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: "test-cluster"
          wait: 120s
          config: test/kind-config.yaml

      - name: Get cluster info
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A
          # Ensure kubeconfig exists and is accessible
          mkdir -p ${{ runner.temp }}
          kind get kubeconfig --name test-cluster > ${{ runner.temp }}/kubeconfig
          ls -la ${{ runner.temp }}/kubeconfig

      - name: Run integration tests
        run: make integration-test
        env:
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
